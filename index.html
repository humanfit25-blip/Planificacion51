:root{
  --cf:#ff2d55; --end:#00d4ff; --halt:#00ff88; --bs:#ff8800; --gold:#ffb800;
  --bg:#04060f; --panel:rgba(10,14,28,.72); --line:rgba(120,140,200,.18);
  --txt:#e8ecf8; --dim:#9aa6c8;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'Rajdhani',sans-serif; color:var(--txt); background:var(--bg);
  min-height:100vh; overflow-x:hidden; line-height:1.45; position:relative;
}
/* ---------- 5 BACKGROUND LAYERS ---------- */
.layer{position:fixed;inset:0;z-index:0;pointer-events:none}
.l-space{background:
  radial-gradient(1200px 800px at 70% -10%,#0a1230 0%,transparent 55%),
  radial-gradient(900px 700px at 10% 110%,#100a26 0%,transparent 55%),
  linear-gradient(180deg,#04060f 0%,#060912 60%,#03040a 100%);}
.l-nebula{background:
  radial-gradient(600px 400px at 20% 30%,rgba(255,45,85,.10),transparent 60%),
  radial-gradient(700px 500px at 80% 60%,rgba(0,212,255,.10),transparent 60%),
  radial-gradient(500px 500px at 50% 90%,rgba(0,255,136,.07),transparent 60%);
  filter:blur(2px);}
.stars{position:fixed;inset:0;z-index:0;pointer-events:none}
.s1{animation:drift 240s linear infinite}
.s2{animation:drift 160s linear infinite reverse}
.s3{animation:drift 90s linear infinite}
@keyframes drift{from{transform:translateY(0)}to{transform:translateY(-600px)}}
.star{position:absolute;border-radius:50%;background:#fff;opacity:.7;
  animation:tw 3s ease-in-out infinite}
@keyframes tw{0%,100%{opacity:.15}50%{opacity:.9}}
.pulsar{position:absolute;width:4px;height:4px;border-radius:50%;
  background:var(--gold);box-shadow:0 0 8px 2px var(--gold);
  animation:pulse 2.6s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(.6);opacity:.3}
  50%{transform:scale(1.8);opacity:1}}
.comet{position:fixed;top:-10%;width:2px;height:2px;border-radius:50%;background:#fff;
  box-shadow:0 0 6px 2px #fff;z-index:0;pointer-events:none;opacity:0}
.comet::after{content:"";position:absolute;top:0;left:0;width:140px;height:1px;
  transform-origin:left center;transform:rotate(135deg);
  background:linear-gradient(90deg,rgba(255,255,255,.9),transparent)}
@keyframes shoot{0%{transform:translate(0,0);opacity:0}
  6%{opacity:1}100%{transform:translate(-120vw,120vh);opacity:0}}
/* ---------- WRAP ---------- */
.wrap{position:relative;z-index:2;max-width:1080px;margin:0 auto;padding:22px 16px 90px}
/* ---------- MISSION PANEL ---------- */
.mission{position:relative;background:var(--panel);border:1px solid var(--line);
  border-radius:18px;padding:26px 22px;overflow:hidden;
  box-shadow:0 0 60px rgba(0,80,160,.12),inset 0 0 40px rgba(0,30,80,.25);
  backdrop-filter:blur(6px)}
.boxname{text-align:center;font-family:'Orbitron',sans-serif;font-weight:700;
  font-size:clamp(18px,4.6vw,30px);letter-spacing:clamp(4px,1.6vw,12px);
  background:linear-gradient(90deg,var(--gold),#fff 50%,var(--gold));
  -webkit-background-clip:text;background-clip:text;color:transparent;
  text-shadow:0 0 22px rgba(255,184,0,.25);margin-bottom:16px;
  padding-bottom:12px;border-bottom:1px solid var(--line)}
.mission-top{display:flex;align-items:center;justify-content:center;gap:18px;flex-wrap:wrap;text-align:center}
.logo{width:78px;height:78px;flex:0 0 auto;filter:drop-shadow(0 0 10px rgba(255,45,85,.5))}
.logo .spin{transform-origin:50% 50%;animation:spin 26s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
